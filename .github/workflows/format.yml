name: On merge to main

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    name: Auto-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Apply ruff format
        run: ruff format .

      - name: Apply ruff lint fixes
        run: ruff check --fix .

      - name: Commit formatting changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && git diff --staged --quiet || \
            git commit -am "style: apply ruff formatting [skip ci]"
          git push

  trigger-infra-deploy:
    name: Trigger infrastructure deploy
    runs-on: ubuntu-latest
    needs: [format]
    steps:
      - name: Dispatch to infrastructure repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          repository: J8Ventures/lista-de-comidas-infrastructure
          event-type: backend-updated
